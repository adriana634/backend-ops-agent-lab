services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mock-api:
    build:
      context: ./services/mock-api
    ports:
      - "8001:8001"

  agent-app:
    build:
      context: ./services/agent-app
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - qdrant
      - mock-api
    environment:
      LAB_OLLAMA_BASE_URL: http://ollama:11434/api
      LAB_QDRANT_URL: http://qdrant:6333
      LAB_MOCK_API_BASE_URL: http://mock-api:8001

volumes:
  ollama_data:
  qdrant_data:
